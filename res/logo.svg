<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" width="1000" height="1000">
  <rect width="1000" height="1000" fill="white"/>
  
  <!-- Monitor outer body -->
  <rect x="50" y="60" width="900" height="620" rx="55" ry="55" fill="#00BFCE"/>
  <!-- Monitor screen (white inset) -->
  <rect x="108" y="118" width="784" height="504" fill="white"/>
  
  <!-- Stand neck -->
  <rect x="432" y="680" width="136" height="125" fill="#00BFCE"/>
  <!-- Base -->
  <rect x="285" y="798" width="430" height="82" rx="12" fill="#00BFCE"/>
  
  <!-- Left angle bracket < using path, thick strokes -->
  <path d="M370,270 L225,438 L370,606" stroke="#00BFCE" stroke-width="68" fill="none" stroke-linecap="square" stroke-linejoin="miter"/>
  
  <!-- Right angle bracket > -->
  <path d="M630,270 L775,438 L630,606" stroke="#00BFCE" stroke-width="68" fill="none" stroke-linecap="square" stroke-linejoin="miter"/>
  
  <!-- Three dots -->
  <circle cx="390" cy="438" r="42" fill="#00BFCE"/>
  <circle cx="500" cy="438" r="42" fill="#00BFCE"/>
  <circle cx="610" cy="438" r="42" fill="#00BFCE"/>
</svg>